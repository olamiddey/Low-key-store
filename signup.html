<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Low-Key Accessories</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    width:320px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

p{
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h1>Create Your Account</h1>
    <form id="signupForm">

<label>Full Name</label>
<input type="text" id="fullName" placeholder="Enter your full name" required>

<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" id="password" placeholder="Create a password" required>

<button type="submit">Sign Up</button>

</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>
    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_ksdY5UnsZcgJaf2g5tYKIpv4QNeT9U4",
  authDomain: "lowkey-store.firebaseapp.com",
  projectId: "lowkey-store",
  storageBucket: "lowkey-store.firebasestorage.app",
  messagingSenderId: "1070305008709",
  appId: "1:1070305008709:web:571a373173f2b90eac172c",
  measurementId: "G-FCEBSLMKKS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("signupForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Account created successfully!");
      window.location.href = "login.html";
    })
    .catch((error) => {
      alert(error.message);
    });
});
</script>

</body>
</html>
