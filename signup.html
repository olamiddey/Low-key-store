<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Low-Key Accessories</title>
  <style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

form{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:300px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

p{
    text-align:center;
}
  </style>
</head>
<body>

    <h1>Create Your Account</h1>

    <form>
        <label>Full Name</label><br>
        <input type="text" placeholder="Enter your full name"><br><br>

        <label>Email</label><br>
        <input type="email" placeholder="Enter your email"><br><br>

        <label>Password</label><br>
        <input type="password" placeholder="Create a password"><br><br>

        <button type="submit">Sign Up</button>
    </form>

    <p>Already have an account?
        <a href="login.html">Login</a>
    </p>

</body>
      </html>
