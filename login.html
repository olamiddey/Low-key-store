<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:black;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

p{
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Login</h1>

<form id="loginForm">

<label>Email</label>
<input type="email" id="email" required>

<label>Password</label>
<input type="password" id="password" required>

<button type="submit">Login</button>

</form>

<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>

  </div>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_ksdY5UnsZcgJaf2g5tYKIpv4QNeT9U4",
  authDomain: "lowkey-store.firebaseapp.com",
  projectId: "lowkey-store",
  storageBucket: "lowkey-store.firebasestorage.app",
  messagingSenderId: "1070305008709",
  appId: "1:1070305008709:web:571a373173f2b90eac172c",
  measurementId: "G-FCEBSLMKKS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login successful!");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
});
</script>

</body>
</html>
