<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - LOW-KEY ACCESSORIES</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#000;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#333;
}
</style>
</head>

<body>

<div class="container">
<h1>🛒 Checkout</h1>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name">

<label>Phone Number</label>
<input type="tel" placeholder="Enter your phone number">

<label>Email Address</label>
<input type="email" placeholder="Enter your email address">

<label>Delivery Address</label>
<textarea rows="4" placeholder="Enter your delivery address"></textarea>

<label>State / City</label>
<input type="text" placeholder="Enter your state or city">

<label>Payment Method</label>
<select>
    <option>Bank Transfer</option>
    <option>Pay on Delivery</option>
</select>

<button>Place Order</button>

</div>

</body>
</html>
