<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Low-Key Accessories</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:40px;
}

.hero{
    background:#222;
    color:#fff;
    text-align:center;
    padding:80px 20px;
}

.hero h2{
    font-size:36px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:25px;
}

.btn{
    background:gold;
    color:#000;
    padding:15px 30px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:8px;
}

.card h3{
    margin:15px 0;
}

.price{
    color:green;
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    background:#111;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.whatsapp{
    text-align:center;
    padding:40px 20px;
    background:#fff;
}

.whatsapp h2{
    margin-bottom:10px;
}

.whatsapp p{
    margin-bottom:20px;
    font-size:18px;
}

.whatsapp a{
    display:inline-block;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    padding:15px 25px;
    border-radius:8px;
    font-weight:bold;
}

footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:20px;
}
</style>

</head>
<body>

<header>
    <h1>LOW-KEY ACCESSORIES</h1>
</header>

<section class="hero">
    <h2>Welcome to Low-Key Store</h2>
    <p>We sell original accessories.</p>
    <a href="#" class="btn">Shop Now</a>
</section>

<section class="products">

<div class="card">
    <img src="https://via.placeholder.com/300x220?text=Watch" alt="Watch">
    <h3>Luxury Watch</h3>
    <p class="price">₦25,000</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x220?text=Necklace" alt="Necklace">
    <h3>Gold Necklace</h3>
    <p class="price">₦18,000</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x220?text=Bracelet" alt="Bracelet">
    <h3>Silver Bracelet</h3>
    <p class="price">₦12,000</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://via.placeholder.com/300x220?text=Ring" alt="Ring">
    <h3>Diamond Ring</h3>
    <p class="price">₦30,000</p>
    <button>Add to Cart</button>
</div>

</section>

<section class="whatsapp">
    <h2>Contact Us on WhatsApp</h2>
    <p>📱 07070397046</p>
    <a href="https://wa.me/2347070397046" target="_blank">
        Chat on WhatsApp
    </a>
</section>

<footer>
    <p>&copy; 2026 Low-Key Accessories. All Rights Reserved.</p>
</footer>

</body>
  </html>
